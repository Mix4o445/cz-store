# Netlify configuration for CoolZone.
#
# The React frontend is built to frontend/dist. The Express backend runs as a
# serverless function (netlify/functions/api.mjs) so /api/* is served by Netlify
# itself — no separate backend host. The function talks to Supabase over HTTPS.
#
# Set these in Netlify → Site settings → Environment variables:
#   SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY, JWT_SECRET, CLIENT_URL
#   (and optionally CLOUDINARY_* / SMTP_* / ADMIN_EMAIL)

[build]
  command = "npm --prefix backend install && npm --prefix netlify/functions install && npm --prefix frontend install && npm --prefix frontend run build"
  publish = "frontend/dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[functions]
  node_bundler = "esbuild"

# API → serverless Express. Must come before the SPA fallback.
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

# SPA fallback: client-side routing for every other path.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
